# Alembic 설정. sqlalchemy.url 은 env.py 에서 COLLECTOR_DATABASE_URL 로 주입한다.
[alembic]
script_location = migrations
prepend_sys_path = src
# 마이그레이션 파일명: 0001_xxx, 0002_xxx ...
file_template = %%(rev)s_%%(slug)s
timezone = Asia/Seoul

# sqlalchemy.url 은 의도적으로 비워둔다(env.py 에서 설정값 주입).
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
